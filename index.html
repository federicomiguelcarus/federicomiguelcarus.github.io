<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carus Imports</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --gray: #888;
      --light-gray: #e8e8e4;
      --accent: #1a1a1a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--black);
      color: var(--white);
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-tag {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ── HERO ── */
    .hero {
      background: var(--black);
      color: var(--white);
      padding: 4rem 1.5rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 39px,
        rgba(255,255,255,0.03) 39px,
        rgba(255,255,255,0.03) 40px
      );
      pointer-events: none;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 0.8rem;
      letter-spacing: -0.02em;
    }

    .hero p {
      font-size: 0.95rem;
      color: #aaa;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 300;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      padding: 1rem 1.5rem;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      border-bottom: 1px solid var(--light-gray);
      background: var(--white);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 0.4rem 1rem;
      border: 1.5px solid var(--black);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 100px;
      transition: all 0.2s;
      color: var(--black);
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--black);
      color: var(--white);
    }

    /* ── GRID ── */
    .catalog {
      padding: 2rem 1rem 4rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (min-width: 600px) {
      .catalog { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
    }

    /* ── CARD ── */
    .card {
      background: #fff;
      border: 1px solid var(--light-gray);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
      animation: fadeUp 0.5s ease both;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-img-wrap {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--light-gray);
      position: relative;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }

    .card:hover .card-img-wrap img { transform: scale(1.06); }

    .card-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--black);
      color: var(--white);
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }

    .card-body {
      padding: 0.9rem 0.8rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .card-cat {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--gray);
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--black);
    }

    .card-desc {
      font-size: 0.78rem;
      color: #666;
      line-height: 1.5;
      flex: 1;
      margin-top: 0.2rem;
    }

    .card-footer {
      padding: 0.6rem 0.8rem 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--light-gray);
    }

    .card-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .card-btn {
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 0.45rem 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .card-btn:hover { background: #333; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    @media (min-width: 600px) {
      .modal-overlay { align-items: center; }
    }

    .modal {
      background: var(--white);
      width: 100%;
      max-width: 480px;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
      transform: translateY(40px);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      max-height: 90vh;
      overflow-y: auto;
    }

    @media (min-width: 600px) {
      .modal { border-radius: 8px; transform: scale(0.92); }
      .modal-overlay.open .modal { transform: scale(1); }
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: var(--light-gray);
    }

    .modal-content { padding: 1.5rem; }

    .modal-cat {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--gray);
      margin-bottom: 0.4rem;
    }

    .modal-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 0.7rem;
    }

    .modal-desc {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 1.2rem;
    }

    .modal-price {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
    }

    .modal-cta {
      width: 100%;
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .modal-cta:hover { background: #333; }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .modal-img-wrap { position: relative; }

    /* ── EMPTY ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--gray);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── FLOATING SOCIAL BUTTONS ── */
    .social-float {
      position: fixed;
      bottom: 1.4rem;
      right: 1.2rem;
      z-index: 150;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      align-items: flex-end;
    }

    .fab {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 1rem 0 0.75rem;
      height: 48px;
      border-radius: 100px;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
      transition: transform 0.2s, box-shadow 0.2s, width 0.3s;
      overflow: hidden;
      white-space: nowrap;
      max-width: 48px;
    }

    .fab:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      max-width: 180px;
    }

    .fab-icon {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
    }

    .fab-label {
      opacity: 0;
      transition: opacity 0.2s 0.1s;
      font-size: 0.8rem;
    }

    .fab:hover .fab-label { opacity: 1; }

    .fab-wa {
      background: #25D366;
      color: #fff;
    }

    .fab-ig {
      background: #111;
      color: #fff;
      border: 1px solid #333;
    }

    /* ── MODAL SOCIAL BUTTONS ── */
    .modal-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.8rem;
    }

    .modal-social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem;
      border-radius: 3px;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-social-btn:hover { opacity: 0.85; }

    .modal-social-btn.wa { background: #25D366; color: #fff; }
    .modal-social-btn.ig { background: #111; color: #fff; border: 1px solid #333; }

    /* ── HEADER SOCIAL ICONS ── */
    .header-icons {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .header-icon {
      display: flex;
      align-items: center;
      color: #aaa;
      transition: color 0.2s;
      text-decoration: none;
    }
    .header-icon:hover { color: #fff; }

    /* ── FOOTER ── */
    footer {
      background: var(--black);
      color: #555;
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    footer span { color: #888; }

    .footer-social {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 1rem;
    }

    .footer-social a {
      color: #555;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-social a:hover { color: #fff; }
  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIGURACIÓN — Solo hay que tocar este bloque
// ═══════════════════════════════════════════════════════════════

// 1. TOKEN de Airtable (Personal Access Token)
//    Ir a: airtable.com → tu foto de perfil → Developer Hub → Personal access tokens → Create token
//    Permisos necesarios: data.records:read  |  Acceso a tu base "Carus Imports"
const AIRTABLE_TOKEN = 'patN4aQEcIzV86AyR.7098eb776059f54901dd5b6457f6fff6ab46e3b52b0775e9d691920c0d3eb765';

// 2. ID de la base (aparece en la URL al abrir la base en Airtable: airtable.com/appXXXXXXXX/...)
const AIRTABLE_BASE_ID = 'appemT8bk6EovlI5f';

// 3. Nombre exacto de la tabla dentro de la base
const AIRTABLE_TABLE = 'Productos';

// 4. WhatsApp: número con código de país, sin +, sin espacios (ej: 56912345678)
const WA_NUMBER = 542396611945';

// 5. Instagram: usuario sin @
const IG_USER = 'carusimports';

// ═══════════════════════════════════════════════════════════════
//  Columnas esperadas en Airtable (deben llamarse exactamente así)
//  nombre | categoria | descripcion | precio | badge | imagen
// ═══════════════════════════════════════════════════════════════

let allProducts = [];
let activeCategory = 'todos';

// ── CARGA DESDE AIRTABLE ────────────────────────────────────────
async function loadFromAirtable() {
  showLoading(true);

  // Si no se han configurado las credenciales, mostrar productos de ejemplo
  if (AIRTABLE_TOKEN === 'TU_TOKEN_AQUI' || AIRTABLE_BASE_ID === 'appXXXXXXXX') {
    allProducts = getDemoProducts();
    showLoading(false);
    buildFilters();
    renderProducts();
    showConfigBanner();
    return;
  }

  try {
    const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE)}?view=Grid%20view`;
    const res = await fetch(url, {
      headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
    });

    if (!res.ok) throw new Error(`Error ${res.status}`);

    const data = await res.json();

    allProducts = data.records.map(r => {
      const f = r.fields;
      // La columna "imagen" en Airtable es un adjunto (array de objetos)
      const imgUrl = Array.isArray(f.imagen) && f.imagen.length > 0
        ? f.imagen[0].url
        : 'https://placehold.co/600x600/e8e8e4/888?text=Sin+imagen';
      return {
        name:        f.nombre      || 'Sin nombre',
        category:    f.categoria   || 'General',
        description: f.descripcion || '',
        price:       f.precio      || '',
        badge:       f.badge       || '',
        image:       imgUrl
      };
    });

    showLoading(false);
    buildFilters();
    renderProducts();

  } catch (err) {
    console.error('Error cargando desde Airtable:', err);
    allProducts = getDemoProducts();
    showLoading(false);
    buildFilters();
    renderProducts();
    showErrorBanner();
  }
}

// ── BANNER: configuración pendiente ────────────────────────────
function showConfigBanner() {
  const banner = document.createElement('div');
  banner.style.cssText = `
    background:#1a1a1a; color:#aaa; text-align:center;
    padding:0.7rem 1rem; font-size:0.72rem; letter-spacing:0.1em;
    text-transform:uppercase; border-bottom:1px solid #333;
  `;
  banner.innerHTML = '⚙️ &nbsp;Modo demo — Configura tu token de Airtable en el código para ver tus productos reales';
  document.querySelector('header').after(banner);
}

function showErrorBanner() {
  const banner = document.createElement('div');
  banner.style.cssText = `
    background:#2a0a0a; color:#f88; text-align:center;
    padding:0.7rem 1rem; font-size:0.72rem; letter-spacing:0.1em;
    text-transform:uppercase; border-bottom:1px solid #500;
  `;
  banner.innerHTML = '⚠️ &nbsp;No se pudo conectar con Airtable — Revisa el token y el ID de la base';
  document.querySelector('header').after(banner);
}

// ── LOADING ─────────────────────────────────────────────────────
function showLoading(show) {
  const catalog = document.getElementById('catalog');
  if (show) {
    catalog.innerHTML = `
      <div style="grid-column:1/-1; text-align:center; padding:4rem 1rem; color:var(--gray);">
        <div style="font-size:0.8rem;letter-spacing:0.2em;text-transform:uppercase;animation:pulse 1.2s infinite;">
          Cargando productos...
        </div>
      </div>`;
  }
}

// ── FILTROS ──────────────────────────────────────────────────────
function buildFilters() {
  const bar = document.getElementById('filterBar');
  // Limpiar filtros previos excepto "Todos"
  bar.innerHTML = `<button class="filter-btn active" onclick="filterProducts('todos', this)">Todos</button>`;
  const cats = [...new Set(allProducts.map(p => p.category))];
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat;
    btn.onclick = function() { filterProducts(cat, this); };
    bar.appendChild(btn);
  });
}

function filterProducts(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

// ── RENDER ───────────────────────────────────────────────────────
function renderProducts() {
  const catalog = document.getElementById('catalog');
  const filtered = activeCategory === 'todos'
    ? allProducts
    : allProducts.filter(p => p.category === activeCategory);

  catalog.innerHTML = '';

  if (filtered.length === 0) {
    catalog.innerHTML = '<div class="empty">Sin productos en esta categoría</div>';
    return;
  }

  filtered.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 0.07}s`;
    const idx = allProducts.indexOf(p);
    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${p.image}" alt="${p.name}" loading="lazy" />
        ${p.badge ? `<span class="card-badge">${p.badge}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-cat">${p.category}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.description}</div>
      </div>
      <div class="card-footer">
        <div class="card-price">${p.price}</div>
        <button class="card-btn" onclick="openModal(${idx})">Ver más</button>
      </div>
    `;
    catalog.appendChild(card);
  });
}

// ── MODAL ────────────────────────────────────────────────────────
function openModal(idx) {
  const p = allProducts[idx];
  document.getElementById('modalImg').src = p.image;
  document.getElementById('modalImg').alt = p.name;
  document.getElementById('modalCat').textContent = p.category;
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalDesc').textContent = p.description;
  document.getElementById('modalPrice').textContent = p.price;

  const waMsg = encodeURIComponent(`Hola! Me interesa el producto: ${p.name} (${p.price})`);
  document.getElementById('modalWaBtn').href = `https://wa.me/${WA_NUMBER}?text=${waMsg}`;
  document.getElementById('modalIgBtn').href = `https://instagram.com/${IG_USER}`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// ── PRODUCTOS DE DEMO (mientras no hay Airtable conectado) ───────
function getDemoProducts() {
  return [
    { name:"Producto Ejemplo 1", category:"Categoría A", description:"Descripción del producto. Conéctate a Airtable para ver tus productos reales.", price:"$25.000", badge:"Nuevo",     image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80" },
    { name:"Producto Ejemplo 2", category:"Categoría B", description:"Descripción del producto. Conéctate a Airtable para ver tus productos reales.", price:"$18.500", badge:"",          image:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=600&q=80" },
    { name:"Producto Ejemplo 3", category:"Categoría A", description:"Descripción del producto. Conéctate a Airtable para ver tus productos reales.", price:"$42.000", badge:"Destacado", image:"https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=600&q=80" },
    { name:"Producto Ejemplo 4", category:"Categoría C", description:"Descripción del producto. Conéctate a Airtable para ver tus productos reales.", price:"$9.990",  badge:"",          image:"https://images.unsplash.com/photo-1556742044-3c52d6e88c62?w=600&q=80" },
    { name:"Producto Ejemplo 5", category:"Categoría B", description:"Descripción del producto. Conéctate a Airtable para ver tus productos reales.", price:"$33.000", badge:"Oferta",    image:"https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=600&q=80" },
    { name:"Producto Ejemplo 6", category:"Categoría C", description:"Descripción del producto. Conéctate a Airtable para ver tus productos reales.", price:"$15.000", badge:"",          image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&q=80" }
  ];
}

// ── SOCIAL LINKS ─────────────────────────────────────────────────
document.querySelectorAll('a[href*="wa.me/TU_NUMERO"]').forEach(a => {
  a.href = a.href.replace('TU_NUMERO', WA_NUMBER);
});
document.querySelectorAll('a[href*="instagram.com/tu_usuario"]').forEach(a => {
  a.href = `https://instagram.com/${IG_USER}`;
});

// ── INIT ─────────────────────────────────────────────────────────
loadFromAirtable();
</script>
